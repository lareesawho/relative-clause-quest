/* ===== GLOBAL ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fp);color:var(--near);background:var(--body-bg);line-height:1.47;letter-spacing:-.374px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:100;width:100%;height:48px;background:var(--nav-bg);backdrop-filter:saturate(180%)blur(20px);-webkit-backdrop-filter:saturate(180%)blur(20px);display:flex;align-items:center;justify-content:center}
nav .inner{width:100%;max-width:calc(980px + env(safe-area-inset-left) + env(safe-area-inset-right));display:flex;align-items:center;justify-content:space-between;padding:0 22px}
nav a{color:var(--nav-text);text-decoration:none;font-size:13px;font-weight:400;transition:.2s;padding:10px 12px;display:inline-block;min-height:44px;line-height:24px}
nav a:focus-visible{outline:2px solid var(--blued);outline-offset:2px;border-radius:4px}
nav a:hover{opacity:.7}
nav .logo{font-size:18px;font-weight:600;letter-spacing:-.5px}
nav .style-select{background:rgba(255,255,255,.1);color:var(--nav-text);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:4px 8px;font-size:12px;font-family:var(--fp);cursor:pointer;min-height:30px;outline:none}
nav .style-select:focus{outline:2px solid var(--blued);outline-offset:2px}
.section{width:100%;padding:80px 24px 100px}
.section.dark{background:var(--black);color:#fff}
.section.light{background:var(--sect);color:var(--near)}
.section.white{background:var(--bg);color:var(--near)}
.inner{max-width:980px;margin:0 auto;width:100%}
h1{font-family:var(--fp);font-size:clamp(28px,5vw,56px);font-weight:600;line-height:1.07;letter-spacing:-.28px;margin-bottom:8px}
h2{font-size:clamp(22px,3.5vw,40px);font-weight:600;line-height:1.1;letter-spacing:normal;margin-bottom:4px}
p{font-size:17px;line-height:1.47;letter-spacing:-.374px;max-width:65ch;color:var(--text)}
.dark p{color:rgba(255,255,255,.8)}
.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:40px}
.phase-card{background:var(--bg);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s;border:none;text-align:left;position:relative;overflow:hidden;display:block;width:100%;font-family:var(--fp);font-size:inherit;color:inherit;min-height:120px;box-shadow:var(--card-shadow)}
.dark .phase-card{background:var(--dark-card-bg);color:#fff}
.phase-card:not(.locked):hover{transform:translateY(-2px)}
.dark .phase-card:not(.locked):hover{background:rgba(255,255,255,.12)}
.phase-card:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
.phase-card .num{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:4px;font-family:var(--fm)}
.dark .phase-card .num{color:var(--dark-txt-dim)}
.phase-card .name{font-size:17px;font-weight:600;margin-bottom:4px;line-height:1.3}
.phase-card .desc{font-size:12px;color:var(--dim);line-height:1.4}
.dark .phase-card .desc{color:rgba(255,255,255,.5)}
.phase-card .check{display:inline-block;margin-top:10px;font-size:12px;color:var(--blue);font-weight:600}
.dark .phase-card .check{color:var(--blued)}
.phase-card.locked{opacity:.4;pointer-events:none;cursor:default}
.phase-card .status{position:absolute;top:12px;right:16px;font-size:14px}
.q-card{background:var(--bg);border-radius:12px;padding:32px 28px;max-width:680px;margin:0 auto;box-shadow:var(--qcard-shadow);display:flex;flex-direction:column;min-height:70vh}
.dark .q-card{background:var(--dark-card-bg)}
.q-prompt{font-size:18px;line-height:1.6;font-weight:500;margin-bottom:20px}
.q-prompt small{font-size:13px;font-weight:400;color:var(--dim)}
.dark .q-prompt small{color:rgba(255,255,255,.5)}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.opt{display:block;width:100%;padding:12px 16px;border:2px solid var(--sect);background:var(--opt-bg);border-radius:var(--radius);font-size:14px;text-align:left;cursor:pointer;transition:all .15s;font-family:var(--fp);color:inherit;min-height:44px;line-height:1.4;word-break:break-word;hyphens:auto}
.dark .opt{border-color:var(--dark-opt-border);color:#fff;background:var(--opt-bg)}
.opt:hover{border-color:var(--blue)}
.opt:focus-visible{outline:3px solid var(--blue);outline-offset:1px;border-color:var(--blue)}
.opt.selected{border-color:var(--blue);background:var(--opt-first-bg)}
.dark .opt.selected{background:var(--dark-opt-sel)}
.opt.correct{background:var(--green);color:#fff;border-color:var(--green)}
.opt.wrong{background:var(--red);color:#fff;border-color:var(--red)}
.opt:disabled{cursor:default}
.opt.correct::after{content:' ✓';font-weight:700}
.opt.wrong::after{content:' ✗';font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:var(--pill);font-size:14px;font-weight:400;border:none;cursor:pointer;transition:all .2s;min-height:44px;min-width:44px;font-family:var(--fp);text-decoration:none}
.btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;pointer-events:none}
.btn-outline{background:transparent;border:1px solid var(--blue);color:var(--blue)}
.btn-outline:hover{background:var(--blue);color:#fff}
.dark .btn-outline{color:var(--blued);border-color:var(--blued)}
.dark .btn-outline:hover{background:var(--blued);color:var(--black)}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:auto;position:sticky;bottom:0;padding-top:12px;padding-bottom:8px;background:var(--bg)}
.progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.progress-bar{flex:1;height:4px;background:var(--sect);border-radius:2px;overflow:hidden}
.dark .progress-bar{background:rgba(255,255,255,.15)}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.progress-txt{font-size:12px;color:var(--dim);font-family:var(--fm);white-space:nowrap}
.dark .progress-txt{color:var(--dark-txt-dim)}
.phase-label{font-size:14px;font-weight:600;margin-bottom:4px}
.explanation{margin-top:16px;padding:14px 18px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.explanation.show{display:block}
.explanation.correct{background:rgba(52,199,89,.1);border-left:3px solid var(--green)}
.explanation.wrong{background:rgba(255,59,48,.1);border-left:3px solid var(--red)}
.dark .explanation.correct{background:var(--dark-ex-correct)}
.dark .explanation.wrong{background:var(--dark-ex-wrong)}
/* ===== GRAMLIN SPEECH BUBBLE ===== */
.gramlin-row{display:flex;align-items:flex-start;gap:10px;margin-top:6px}
.gramlin-avatar{width:44px;height:44px;border-radius:10px;flex-shrink:0}
.gramlin-bubble{position:relative;background:var(--bg);border:2px solid var(--blue);border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.45;font-weight:500;color:var(--near);max-width:520px;flex:1}
.gramlin-bubble::before{content:'';position:absolute;left:-8px;top:12px;width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-right:8px solid var(--blue)}
.gramlin-bubble::after{content:'';position:absolute;left:-4px;top:13px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:7px solid var(--bg)}
.gramlin-bubble.sassy{border-color:var(--red);background:#fff5f5}
.gramlin-bubble.sassy::before{border-right-color:var(--red)}
.gramlin-bubble.sassy::after{border-right-color:#fff5f5}
.gramlin-bubble.broken{border-color:var(--dim);background:#f5f5f5;font-style:italic;color:var(--dim)}
.gramlin-bubble.broken::before{border-right-color:var(--dim)}
.gramlin-bubble.broken::after{border-right-color:#f5f5f5}
.dark .gramlin-bubble{background:var(--dark-card-bg);color:#fff}
.dark .gramlin-bubble::after{border-right-color:var(--dark-card-bg)}
.dark .gramlin-bubble.sassy{background:rgba(255,59,48,.08)}
.dark .gramlin-bubble.sassy::after{border-right-color:rgba(255,59,48,.08)}
.dark .gramlin-bubble.broken{background:rgba(255,255,255,.05);color:var(--dim)}
.dark .gramlin-bubble.broken::after{border-right-color:rgba(255,255,255,.05)}
.stars{font-size:32px;margin:8px 0;letter-spacing:4px}
.star-filled{color:var(--blue)}
.star-empty{color:var(--sect)}
.dark .star-empty{color:rgba(255,255,255,.15)}
.back-btn{position:fixed;top:60px;left:16px;z-index:99;background:transparent;border:none;color:var(--blue);font-size:28px;cursor:pointer;padding:8px 12px;display:none;line-height:1;min-width:44px;min-height:44px;text-align:center}
.back-btn:focus-visible{outline:3px solid var(--blue);outline-offset:1px}
.dark .back-btn{color:var(--blued)}
.mastery{display:flex;justify-content:center;gap:8px;margin:16px 0;flex-wrap:wrap}
.mastery span{align-items:center;gap:4px;font-size:12px;color:var(--dim);font-family:var(--fm)}
.dark .mastery span{color:var(--dark-txt-dim)}
.tool-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.tool-btn{font-size:11px;color:var(--dim);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:var(--fp);padding:6px 8px;min-height:44px;min-width:44px;display:inline-flex;align-items:center;gap:4px}
.tool-btn:hover{opacity:1;color:var(--near)}
.dark .tool-btn{color:var(--dark-txt-dim)}

<script>
// ==================== STYLE SWITCHER ====================
function setStyle(v){
  document.documentElement.setAttribute('data-style',v);
  localStorage.setItem('rcq4_style',v);
}
(function(){
  let saved = localStorage.getItem('rcq4_style')||'gramlin';
  document.getElementById('styleSwitcher').value = saved;
  document.documentElement.setAttribute('data-style',saved);
})();

// ==================== CSV LOADER (robust backend) ====================
function parseCSV(txt){
  var rows=[],row=[],field='',inQ=false;
  for(var i=0;i<txt.length;i++){
    var c=txt[i],n=txt[i+1];
    if(inQ){if(c==='"'){if(n==='"'){field+='"';i++}else inQ=false}else field+=c}
    else if(c==='"'){inQ=true}
    else if(c===','){row.push(field);field=''}
    else if(c.charCodeAt(0)===10||c.charCodeAt(0)===13){if(c.charCodeAt(0)===13&&n&&n.charCodeAt(0)===10)i++;row.push(field);rows.push(row);row=[];field=''}
    else field+=c;
  }
  if(field||row.length){if(field&&field.length>0&&field.charCodeAt(field.length-1)===13)field=field.slice(0,-1);row.push(field);if(row.length>1)rows.push(row)}
  return rows;
}
function buildCSVData(csv){
  var rows=parseCSV(csv);rows.shift();var phases=[],cur=null,totalQ=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];while(r.length<9)r.push('');
    var pid=r[0],pname=r[1],psub=r[2],pdesc=r[3],qtext=r[5],a=r[6],opts=r[7].split('|||'),tip=r[8]||'';
    if(!opts.length||opts.length<2)continue;
    if(!cur||cur.id!==pid){cur={id:pid,name:pname,s:psub,d:pdesc,q:[]};phases.push(cur)}
    cur.q.push({q:qtext,a:a.includes('|||')?a.split('|||'):a,o:opts,t:tip});totalQ++;
  }
  return {title:'Gramlingo',phases:phases,_q:totalQ,_p:phases.length};
}
function validateData(d){return d&&d._p>=10&&d._q>=70&&d.phases.every(function(p){return p.q.length>0&&p.id&&p.name})}
var _unlocking=false;
async function unlockGame(){
  if(_unlocking)return;_unlocking=true;
  var pin=document.getElementById('pin-input').value.trim().toLowerCase();
  if(pin!=='gramlin'&&pin!=='1234'){document.getElementById('pin-error').style.display='block';_unlocking=false;return}
  var ps=document.getElementById('pin-screen');ps.innerHTML='<div class="pin-card"><p>Loading questions…</p></div>';
  try{
    var r=await fetch('https://raw.githubusercontent.com/lareesahu/gramlingo/main/questions.csv',{cache:'reload'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var csv=await r.text();
    DATA=buildCSVData(csv);
    if(!validateData(DATA))throw new Error('Invalid data: '+DATA._p+' phases, '+DATA._q+' questions');
    localStorage.setItem('gram_csv',csv);localStorage.setItem('gram_csv_v',Date.now().toString());
  }catch(e){
    localStorage.removeItem('gram_csv');
    try{
      var r2=await fetch('https://raw.githubusercontent.com/lareesahu/gramlingo/main/questions.csv');
      var csv2=await r2.text();
      DATA=buildCSVData(csv2);
      if(!validateData(DATA))throw new Error('Invalid on retry');
      localStorage.setItem('gram_csv',csv2);
    }catch(e2){
      var cached=localStorage.getItem('gram_csv');
      if(cached){DATA=buildCSVData(cached);if(!validateData(DATA)){localStorage.removeItem('gram_csv');alert('Cached data corrupt. Please refresh.');_unlocking=false;return}}
      else{alert('Could not load questions. Check your connection.');ps.innerHTML='<div class="pin-card"><h2>Gramlingo</h2><p style="color:var(--dim)">Failed to load.</p><button class="btn btn-primary" onclick="location.reload()">Retry</button></div>';_unlocking=false;return}
    }
  }
  ps.style.display='none';document.getElementById('nav-wrap').style.display='block';
  console.log('Gramlingo loaded:',DATA._p,'phases,',DATA._q,'questions');
  render();_unlocking=false;
}

// ==================== CURRICULUM DATA ====================

{q:'下面哪个部分是定语从句？<br><em>The woman <u>who called me</u> is my manager.</em>',a:'who called me',o:['The woman','who called me','is my manager','my manager']},
{q:'下面哪个部分是定语从句？<br><em>I read the book <u>that you recommended</u>.</em>',a:'that you recommended',o:['I read','the book','that you recommended','the book that']},

{q:'The client ___ we met yesterday is from Tokyo.',a:['whom','that'],o:['who','whom','which','that'],t:'指人作宾语 → whom(正式) 或 that(非正式)'},
{q:'The people ___ I invited are coming.',a:['whom','that'],o:['who','whom','which','that'],t:'人作宾语 → whom(正式) 或 that(非正式)'},
{q:'The report ___ Anna wrote is on the table.',a:['that','which'],o:['who','that','which','where'],t:'report是wrote的宾语 → that/which'},
{q:'The advice ___ she gave me was helpful.',a:['that','which'],o:['who','that','which','where'],t:'advice是gave的宾语 → that/which'},
]},
{id:'subobj',name:'区分：主语vs宾语',s:'技巧：找额外的主语',d:'从句中已经有主语 → 关系代词是宾语。从句中没有额外主语 → 关系代词是主语',q:[

function P_TOTAL(){let k={};for(let p of DATA.phases)k[p.id]=p.q.length;return k}
const TOTALS=P_TOTAL();

function pctNeeded(total){return Math.ceil(total*0.7)}
function isComplete(pid){let p=S.progress[pid];let need=pctNeeded(TOTALS[pid]);return p?p.score>=need:false}
function isLocked(pid){
  let o=['rec','subj','obj','subobj','oblq','gen','rest','prod'];
  let i=o.indexOf(pid);if(i===0)return false;
  let prev=S.progress[o[i-1]]||{};let need=pctNeeded(TOTALS[o[i-1]]);
  return (prev.score||0)<need;
}

// ==================== EXPORT / IMPORT ====================
function exportProgress(){
  let data=JSON.stringify(S.progress,null,2);
  let blob=new Blob([data],{type:'application/json'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;a.download='rcq4_backup.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  let d=new Date();let ts=d.toLocaleDateString('zh-CN')+' '+d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  S.progress._exported=ts;save();
  announce('✅ 进度已下载为 backup 文件');
}
function importProgress(){
  let inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    let file=e.target.files[0];if(!file)return;
    let reader=new FileReader();
    reader.onload=function(ev){
      try{
        let data=JSON.parse(ev.target.result);
        let valid=Object.keys(data).length>0;
        for(let k in data) if(!TOTALS[k]&&k!=='_exported'){valid=false;break}
        if(!valid){announce('⚠️ 文件格式不正确');return}
        S.progress=data;
        save();render();
        announce('✅ 进度已恢复！共 '+Object.keys(S.progress).length+' 条记录');
      }catch(e){announce('⚠️ 文件读取出错，请确认是备份文件');}
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ==================== WRONG-BOOK ====================
function loadWrong(){try{return JSON.parse(localStorage.getItem('rcq4_wrong')||'{}')}catch(e){return{}}}
function saveWrong(d){localStorage.setItem('rcq4_wrong',JSON.stringify(d))}
function qKey(q){return q._key||(q._key=btoa(unescape(encodeURIComponent((q.q||'')+'|'+(Array.isArray(q.a)?q.a.join(','):q.a||'')))).slice(0,24))}

function showWrongBank(){
  S.active=null;
  let wk = loadWrong();
  let items = Object.values(wk);
  if(!items.length){ alert(_('empty_wrong')); renderHome(); return; }
  items.sort((a,b)=>b.lastWrong-a.lastWrong);
  document.getElementById('backBtn').style.display='none';
  let app=document.getElementById('app');
  let h=`<div class="section dark"><div class="inner" style="text-align:center">
    <h1>'+_('wrong_header')+'<span style="color:var(--red)">.</span></h1>
    <p style="max-width:600px;margin:0 auto;font-size:15px">${items.length} ${_('wrong_count')}</p>
  </div></div><div class="section light"><div class="inner" style="max-width:680px">
    <div style="margin-bottom:16px">`;
  for(let it of items){
    let cls = it.attempts>=3?'w-badge many':'w-badge one';
    let phaseLabel = it.phaseName || it.phaseId;
    let correctA = Array.isArray(it.correctAnswer) ? it.correctAnswer.join(' / ') : it.correctAnswer;
    h+=`<div class="wrong-item fade-in" onclick="retakeOne('${it.key}')" tabindex="0" role="button" aria-label="重做此题">
      <div class="w-info"><div class="w-q">${it.prompt}</div>
      <div class="w-meta">${phaseLabel} · 正确答案：<span class="w-answer">${esc(correctA)}</span></div></div>
      <span class="${cls}">×${it.attempts}</span></div>`;
  }
  h+=`</div><div class="btn-row">
    <button class="btn btn-outline" onclick="retakeAll()">'+_('wrong_retake_all')+'</button>
    <button class="btn btn-outline" onclick="if(confirm('清空所有错题记录？')){localStorage.removeItem('rcq4_wrong');renderHome();announce('✅ 错题集已清空')}" style="border-color:var(--red);color:var(--red)">🗑 清空错题集</button>
    <button class="btn btn-primary" onclick="renderHome()">← 返回首页</button></div></div></div>`;
  app.innerHTML=h;
}

function retakeOne(key){
  let wk = loadWrong();
  let it = wk[key]; if(!it) return;
  let phase = DATA.phases.find(p=>p.id===it.phaseId); if(!phase) return;
  let match = phase.q.find(q=>q.q===it.prompt); if(!match) return;
  S.active=it.phaseId; S.idx=0; S.score=0; S.total=0; S.answered=false; S.sel=null;
  let rest = shuffle([...phase.q.filter(q=>q.q!==it.prompt)]);
  S.phaseQs = [match, ...rest]; render();
}

function retakeAll(){
  let wk = loadWrong(); let items = Object.values(wk);
  if(!items.length) return;
  let questions = [];
  for(let it of items){
    let phase = DATA.phases.find(p=>p.id===it.phaseId);
    if(!phase) continue;
    let match = phase.q.find(q=>q.q===it.prompt);
    if(match) questions.push(match);
  }
  if(!questions.length) return;
  S.active='_wrong'; S.idx=0; S.score=0; S.total=0; S.answered=false; S.sel=null;
  S.phaseQs=shuffle(questions); render();
}

// ==================== PHASE PLAY ====================
function startPhase(pid){
  S.active=pid;S.idx=0;S.score=0;S.total=0;S.answered=false;S.sel=null;
  S.phaseQs=shuffle([...DATA.phases.find(p=>p.id===pid).q]);render();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function gramlinSay(mistakeCount, isSassy) {
  let idx = Math.min(mistakeCount - 1, 5);
  if (idx >= 5) { // broken
    return { text: GRAMLIN.broken[Math.floor(Math.random() * GRAMLIN.broken.length)], face: GRAMLIN.sad, cls: 'broken' };
  }
  let cat = GRAMLIN.lines[idx];
  // Determine if this draw is motivational or sassy based on ratio
  let ratios = [5,4,3,2,1]; // mot count per 1 sass for each category
  let totalWeight = ratios[idx] + 1;
  let roll = Math.floor(Math.random() * totalWeight);
  // If isSassy param passed (from wrong-book retake), bias towards sass
  let pool, cls;
  if (roll < ratios[idx]) {
    pool = cat.mot; cls = '';
  } else {
    pool = cat.sass; cls = 'sassy';
  }
  return { text: pool[Math.floor(Math.random() * pool.length)], face: GRAMLIN.sad, cls: cls };
}

function gramlinCheer() {
  let text = GRAMLIN.cheer[Math.floor(Math.random() * GRAMLIN.cheer.length)];
  return { text: text, face: GRAMLIN.celebrate, cls: '' };
}

function renderPhase(){
  let app=document.getElementById('app');
  let isWrongMode = S.active==='_wrong';
  let p = isWrongMode ? {id:'_wrong',name:'错题复习',s:'专攻薄弱环节',d:'这些是你之前答错的题目，集中突破。'} : DATA.phases.find(p=>p.id===S.active);
  if(!p){showHome();return}
  if(S.idx>=S.phaseQs.length){renderComplete(app,p,isWrongMode);return}
  let q=S.phaseQs[S.idx];S.answered=false;S.sel=null;
  let t=S.phaseQs.length,pct=Math.round(S.idx/t*100);
  let h=`<div class="section light fade-in"><div class="inner" style="max-width:680px">
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="progress-txt">${S.idx+1}/${t}</span></div>
    <div class="phase-label" style="margin-bottom:2px">${p.name}</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:12px">${p.d}</div>
    <div class="q-card"><div class="q-prompt">${q.q}</div><div class="options">`;
  let oLabel='ABCDEFGH';
  for(let i=0;i<q.o.length;i++) h+=`<button class="opt" data-v="${esc(q.o[i])}" onclick="pick(this)">${oLabel[i]}. ${q.o[i]}</button>`;
  h+=`</div><div class="explanation" id="expl"></div><div class="btn-row">
    <button class="btn btn-primary" id="checkBtn" disabled onclick="check()">${_('check')}</button>
    <button class="btn btn-outline" id="nextBtn" style="display:none" onclick="next()">${_('next')}</button>
  </div></div></div></div>`; app.innerHTML=h;
}
function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}

function pick(el){
  document.querySelectorAll('.opt').forEach(b=>{b.classList.remove('selected')});
  el.classList.add('selected');S.sel=el.dataset.v;
  document.getElementById('checkBtn').disabled=false;
}

function check(){
  if(S.answered)return;
  let q=S.phaseQs[S.idx];let correct=false;
  let answers=Array.isArray(q.a)?q.a:[q.a];
  for(let ans of answers){if(norm(S.sel)===norm(ans)){correct=true;break}}
  S.answered=true;S.total++;if(correct)S.score++;
  let k = qKey(q);let wk = loadWrong();
  if(!correct){
    let an = Array.isArray(q.a) ? q.a[0] : q.a;
    let phase = DATA.phases.find(ph=>ph.id===S.active);
    if(wk[k]){wk[k].attempts++;wk[k].lastWrong=Date.now();wk[k].userAnswer=S.sel;}
    else{wk[k]={key:k,phaseId:S.active,phaseName:(phase||{}).name||S.active,prompt:q.q,correctAnswer:an,userAnswer:S.sel,attempts:1,lastWrong:Date.now()};}
    saveWrong(wk);
  }else if(wk[k]){delete wk[k];saveWrong(wk);}
  document.querySelectorAll('.opt').forEach(b=>{
    let match=false;
    for(let ans of answers){if(norm(b.dataset.v)===norm(ans)){match=true;break}}
    if(match){b.classList.add('correct');b.classList.add('correct-pop')}
    else if(b.classList.contains('selected')&&!match){b.classList.add('wrong');b.classList.add('wrong-shake')}
    b.disabled=true;
  });
  let expl=document.getElementById('expl');
  expl.className='explanation show '+(correct?'correct':'wrong');
  let displayAns=answers.map(a=>'<b>'+esc(a)+'</b>').join(' 或 ');
  let t=q.t||'';
  let gramlinFace = correct ? 'https://raw.githubusercontent.com/lareesahu/grammar-game-ui-brainstorm/main/assets/gramlin-celebrate.png' : 'https://raw.githubusercontent.com/lareesahu/grammar-game-ui-brainstorm/main/assets/gramlin-sad.png';
  if(correct){
    let g = gramlinCheer();
    expl.innerHTML='<div class="gramlin-row"><img src="'+g.face+'" class="gramlin-avatar" alt="Gramlin"><div class="gramlin-bubble'+ (g.cls?' '+g.cls:'') +'">'+esc(g.text)+'</div></div><small style="opacity:.7;display:block;margin-top:6px">'+esc(t)+'</small>';
  } else {
    let mc = wk[k] ? wk[k].attempts : 1;
    let g = gramlinSay(mc);
    expl.innerHTML='<div class="gramlin-row"><img src="'+g.face+'" class="gramlin-avatar" alt="Gramlin"><div class="gramlin-bubble'+ (g.cls?' '+g.cls:'') +'">'+esc(g.text)+'</div></div><div style="margin-top:6px;color:var(--red);font-weight:600">✗ 正确答案：'+displayAns+'</div><small style="opacity:.7;display:block;margin-top:4px">'+esc(t)+'</small>';
  }
  announce(correct?'正确！继续下一题':'答错了，答案显示在下方');
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-flex';
}

function next(){
  let isWrongMode = S.active==='_wrong';
  if(!isWrongMode){
    if(!S.progress[S.active])S.progress[S.active]={score:0};
    S.progress[S.active].total=(S.progress[S.active].total||0)+1;
    S.progress[S.active].score=Math.max(S.progress[S.active].score||0,S.score); save();
  }S.idx++;render();
}
function norm(s){return(s||'').toLowerCase().replace(/[.,!?;:'"《》「」『』（）()]/g,'').replace(/\s+/g,' ').trim()}

function renderComplete(app,p,isWrongMode){
  let t=S.phaseQs.length,pct=Math.round(S.score/t*100),stars=pct>=90?3:pct>=70?2:pct>=50?1:0;
  if(isWrongMode){
    let h=`<div class="section dark"><div class="inner" style="text-align:center">
      <div style="font-size:64px;margin-bottom:16px">${stars>=3?'🏆':stars>=2?'🎉':stars>=1?'👍':'💪'}</div>
      <h1>错题复习 — 完成！</h1>
      <div class="stars">${'★'.repeat(Math.min(stars,3))+'☆'.repeat(Math.max(0,3-stars))}</div>
      <div class="stats" style="font-size:17px;margin:12px 0">${S.score}/${t} 答对 (${pct}%)</div>
      <p style="color:rgba(255,255,255,.5)">${pct>=70?'大部分都掌握了！':'继续加油，回到错题集再练一次。'}</p>
      <div class="btn-row" style="margin-top:24px">
        <button class="btn btn-outline" onclick="showWrongBank()">← 返回错题集</button>
        <button class="btn btn-primary" onclick="renderHome()">← 返回首页</button></div></div></div>`;
    app.innerHTML=h; return;
  }
  let prev=S.progress[S.active]||{score:0},need=pctNeeded(t);
  if(S.score>prev.score){S.progress[S.active]={score:S.score,total:t};save()}
  let i=DATA.phases.indexOf(p),np=DATA.phases[i+1],all=DATA.phases.every(ph=>isComplete(ph.id));
  let unlocked=S.score>=need;
  let h=`<div class="section dark"><div class="inner" style="text-align:center">
    <div style="font-size:64px;margin-bottom:16px">${stars>=3?'🏆':stars>=2?'🎉':stars>=1?'👍':'💪'}</div>
    <h1>${p.name} — '+_('complete_title')+'</h1>
    <div class="stars">${'★'.repeat(Math.min(stars,3))+'☆'.repeat(Math.max(0,3-stars))}</div>
    <div class="stats" style="font-size:17px;margin:12px 0">${S.score}/${t} 答对 (${pct}%)</div>`;
  if(unlocked&&pct<70) h+=`<p style="color:rgba(255,255,255,.5)">不错！下一阶段已解锁，但可以再练一次达到70%+</p>`;
  else if(!unlocked) h+=`<p style="color:rgba(255,255,255,.5)">需要≥${need}/${t}题正确（${Math.ceil(need/t*100)}%）才能解锁下一阶段，再练一次！</p>`;
  else if(unlocked&&pct<90) h+=`<p style="color:rgba(255,255,255,.5)">很好！准备进入下一阶段了吗？</p>`;
  else h+=`<p style="color:rgba(255,255,255,.5)">太棒了！完美通关！</p>`;
  h+=`<div class="btn-row" style="margin-top:24px"><button class="btn btn-outline" onclick="showHome()">← 全部阶段</button><button class="btn btn-primary" onclick="startPhase('${p.id}')">↻ 重做</button>`;
  if(np&&!isLocked(np.id)) h+=`<button class="btn btn-primary" style="background:var(--green)" onclick="startPhase('${np.id}')">${np.name} →</button>`;
  else if(np&&isLocked(np.id)) h+=`<button class="btn btn-primary" disabled style="opacity:.4">🔒 ${np.name} (需≥${pctNeeded(TOTALS[np.id])}题)</button>`;
  if(all) h+=`<p style="margin-top:24px;color:var(--green);font-size:17px;font-weight:600">🎉 全部8个阶段完成！你已经掌握了定语从句！</p>`;
  h+=`</div></div></div>`; app.innerHTML=h;
}

function showHome(){S.active=null;render()}
function announce(msg){let el=document.getElementById('announce');if(el){el.textContent='';setTimeout(()=>{el.textContent=msg},50)}}
render();
</script>
